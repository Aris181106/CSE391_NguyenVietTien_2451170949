<form>
    <label for="name">Tên:</label> 
    <input type="text" id="name" name="name" required>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Email của bạn">
    <label for="password">Mật khẩu:</label>
    <input type="password" id="password" name="password" placeholder="Mật khẩu" required>
    <label for="repassword">Xác nhận mật khẩu</label>
    <input type="password" id="repassword" name="repassword" placeholder="Nhập lại mật khẩu" required>
    <label for="tel">Số điện thoại:</label>
    <input type="tel" id="tel" name="tel" placeholder="0901234567" required>
    <label for="city">Thành phố:</label>
    <select id="city" name="city">
        <option>Hà Nội</option>
        <option>TP.HCM</option>
    </select>
    <input type="checkbox" id="checkbox" name="checkbox" required>
    <label for="checkbox">
        Tôi đồng ý điều khoản
    </label>
    <button type="submit">Xác nhận</button>
</form>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1", height= 250px, width = 1000px>
        <thead>
            <tr>
                <td>STT</td>
                <td>Sản phẩm</td>
                <td>Đơn giá</td>
                <td>Số lượng</td>
                <td>Thành tiền</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Khô gà lá chanh</td>
                <td>36.000đ</td>
                <td>50</td>
                <td>1.800.000đ</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Nước mía</td>
                <td>18.000đ</td>
                <td>2</td>
                <td>36.000đ</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Kẹo rau củ</td>
                <td>140.000đ</td>
                <td>10</td>
                <td>1.400.000đ</td>
            </tr>
        </tbody>
        <tfoot> 
            <tr>
                <td>Tổng cộng:</td>
                <td colspan="4">Tổng: 3.236.000đ</td>
            </tr>
        </tfoot>
    </table>

    <fieldset>
        <legend>Form thanh toán</legend>
        <input type="radio" id="COD" name="Payment"> 
        <label for="COD">COD</label>
        <input type="radio" id="banking" name="Payment">
        <label for="banking">Chuyển khoản</label>
        <input type="radio" id="e-wallet" name="Payment">
        <label for="e-wallet">Ví điện tử</label>
        <br>
        <label for="Discount">Discount</label>
        <input type="text" id="Discount" name="Discount" pattern="SALE[0-9]{4}">
    </fieldset>

    <fieldset>
        <legend>Thông tin giao hàng</legend>
        <label for="shipping_date">Ngày giao hàng</label>
        <input type="date" id="shipping_date" name="shipping_date" min="2026-04-30">
        <label for="time">Khung giờ giao hàng</label>
        <select id="time" name="time">
            <option value="">-- Chọn khung giờ </option>
            <option value="Sáng">8h-12h</option>
            <option value="Chiều">14h-18h</option>
            <option value="Tối">18h-21h</option>
        </select>
        <br>
        <label for="shipping_time">Số ngày</label>
        <input type="range" id="shipping_time" name="shipping_time" min="1" max="7" step="1">
    </fieldset>

    <button type="submit" aria-label="Xác nhận đặt hàng">Xác nhận</button>
</body>
</html>

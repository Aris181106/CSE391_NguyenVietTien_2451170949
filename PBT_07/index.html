<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log(typeof null);      
        console.log(typeof undefined);         
        console.log(typeof NaN);              
        console.log("5" + 3);                
        console.log("5" - 3);                 
        console.log("5" * "3");             
        console.log(true + true);         
        console.log([] + []);              
        console.log([] + {});              
        console.log({} + []); 
        console.log(5 == "5");              
        console.log(5 === "5");             
        console.log(null == undefined);      
        console.log(null === undefined);     
        console.log(NaN == NaN);         
        console.log(0 == false);            
        console.log(0 === false);          
        console.log("" == false);      
        if ("0") console.log("A");           
        if ("") console.log("B");            
        if ([]) console.log("C");           
        if ({}) console.log("D");            
        if (null) console.log("E");        
        if (0) console.log("F");           
        if (-1) console.log("G");            
        if (" ") console.log("H");
    </script>
</body>
</html>
